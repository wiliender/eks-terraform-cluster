name: "Terraform"

on: 
  push:
    branches: ["mnain"]
    paths: ["src/**"]
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
           aws-region: sa-east-1
           aws-access-key-id: ${{ secrets.AWS_ACESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.AWS_SECRET_ACESS_KEY_ID }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Terraform init
        working-directory: ./src
        run: terraform init -backend-config="bucket=${{ secrets.AWS_BUCKET_NAME }}" -backend-config="key=${{ secrets.AWS_BUCKET_FILE }}"

      - name: Terraform Apply
        working-directory: ./src
        run: terraform apply --auto-aprove